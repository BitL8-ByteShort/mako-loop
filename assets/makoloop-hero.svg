<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 720" role="img" aria-label="MakoLoop animated hero with a cloud code core, circling mako shark, and code rings">
  <title>MakoLoop</title>
  <desc>A dark developer-console banner with a glowing cloud-code core, orbiting code rings, and a sleek mako shark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07101d"/>
      <stop offset="0.55" stop-color="#0b1b2d"/>
      <stop offset="1" stop-color="#120f24"/>
    </linearGradient>
    <radialGradient id="cloud" cx="45%" cy="30%" r="70%">
      <stop offset="0" stop-color="#c8b8ff"/>
      <stop offset="0.42" stop-color="#6f8dff"/>
      <stop offset="1" stop-color="#123cff"/>
    </radialGradient>
    <linearGradient id="shark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16313f"/>
      <stop offset="0.45" stop-color="#2c6f83"/>
      <stop offset="1" stop-color="#061925"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1b6dff" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#9fdcff" flood-opacity="0.55"/>
    </filter>
    <path id="orbit1" d="M235 355 C410 120 740 80 1030 190 C1265 278 1408 440 1335 555 C1238 710 822 690 540 595 C286 510 120 455 235 355Z"/>
    <path id="orbit2" d="M330 450 C470 250 808 210 1085 285 C1330 352 1458 470 1350 565 C1235 668 812 650 520 568 C342 518 250 490 330 450Z"/>
  </defs>

  <rect width="1680" height="720" fill="url(#bg)"/>
  <g opacity="0.28">
    <path d="M0 584 C210 512 300 620 500 545 S822 500 1040 560 1372 620 1680 520" fill="none" stroke="#3dd8ff" stroke-width="3"/>
    <path d="M0 616 C260 560 378 660 590 594 S938 535 1160 610 1462 640 1680 575" fill="none" stroke="#8769ff" stroke-width="2"/>
  </g>

  <g opacity="0.32" font-family="JetBrains Mono, Cascadia Mono, monospace" font-size="21" fill="#aeeeff">
    <text x="90" y="130">const loop = await mako.ship()</text>
    <text x="1120" y="112">verify({ security: true })</text>
    <text x="106" y="610">research -&gt; build -&gt; verify -&gt; ship</text>
    <text x="1160" y="650">if (state !== "DONE") continue</text>
  </g>

  <g filter="url(#glow)" opacity="0.82">
    <use href="#orbit1" fill="none" stroke="#7df1ff" stroke-width="4" stroke-dasharray="10 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="9s" repeatCount="indefinite"/>
    </use>
    <use href="#orbit2" fill="none" stroke="#bd8cff" stroke-width="3" stroke-dasharray="4 16">
      <animate attributeName="stroke-dashoffset" from="0" to="160" dur="7s" repeatCount="indefinite"/>
    </use>
  </g>

  <g opacity="0.65" font-family="JetBrains Mono, Cascadia Mono, monospace" font-size="18" fill="#d7fbff">
    <text>
      <textPath href="#orbit1" startOffset="4%">Research  Build  Verify  Security  Ship  .mako-loop  DONE  BLOCKED  RESCOPED</textPath>
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="5s" repeatCount="indefinite"/>
    </text>
    <text>
      <textPath href="#orbit2" startOffset="18%">schema  llms.txt  tests  screenshots  source-led  deploy preview</textPath>
      <animate attributeName="opacity" values="0.85;0.3;0.85" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <g transform="translate(680 275)" filter="url(#soft)">
    <path d="M-84 58 C-122 58 -154 27 -154 -12 C-154 -49 -126 -82 -89 -87 C-70 -127 -25 -150 20 -135 C48 -163 98 -158 122 -124 C166 -121 202 -86 202 -42 C202 -12 186 14 162 28 C163 78 122 118 72 118 L-84 118 C-118 118 -145 91 -145 58 C-145 24 -118 -3 -84 -3 C-60 -3 -40 10 -30 30 C-17 10 7 -2 34 2 C62 6 84 27 91 54 C103 45 119 42 133 47 C105 63 78 72 45 72 L-84 72Z" fill="url(#cloud)"/>
    <path d="M-112 59 C-80 27 -38 50 8 49 C58 48 92 11 146 25" fill="none" stroke="#f4fbff" stroke-opacity="0.78" stroke-width="8" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="20 460;180 300;20 460" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <text x="-10" y="46" text-anchor="middle" font-family="JetBrains Mono, Cascadia Mono, monospace" font-size="26" fill="#f8fbff">function makoLoop()</text>
    <text x="8" y="82" text-anchor="middle" font-family="JetBrains Mono, Cascadia Mono, monospace" font-size="22" fill="#e6efff">return build();</text>
    <animateTransform attributeName="transform" type="scale" values="1;1.025;1" dur="4s" additive="sum" repeatCount="indefinite"/>
  </g>

  <g transform="translate(705 500)">
    <path d="M-18 -16 C100 -84 270 -78 405 -18 C310 15 194 38 70 32 C25 30 -8 12 -18 -16Z" fill="url(#shark)"/>
    <path d="M70 31 C182 42 290 18 405 -18 C316 62 156 90 22 61 C0 54 -14 38 -18 -16 C-1 9 28 24 70 31Z" fill="#f4fbff"/>
    <path d="M106 -50 L70 1 L142 -10 Z" fill="#061925"/>
    <path d="M7 -15 L-92 -57 L-52 2 L-115 44 Z" fill="#113343"/>
    <path d="M216 29 L174 88 L260 42 Z" fill="#0b2b38"/>
    <circle cx="360" cy="-14" r="7" fill="#dffaff"/>
    <circle cx="362" cy="-14" r="3" fill="#061925"/>
    <path d="M105 -2 C178 10 258 -1 339 -25" fill="none" stroke="#58f2ff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <path d="M328 4 L370 -5" stroke="#061925" stroke-width="4" stroke-linecap="round"/>
    <path d="M307 10 L342 2" stroke="#061925" stroke-width="3" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="705 500;720 488;705 500" dur="5s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(105 204)">
    <text x="0" y="0" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#ffffff">MakoLoop</text>
    <text x="4" y="54" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#bfefff">Principal-grade product loops for AI coding agents</text>
    <rect x="4" y="90" width="520" height="54" rx="16" fill="#07121e" stroke="#294961"/>
    <text x="28" y="126" font-family="JetBrains Mono, Cascadia Mono, monospace" font-size="25" fill="#f3fbff">/mako-loop ship workflow</text>
    <rect x="4" y="170" width="118" height="34" rx="17" fill="#0e2e38" stroke="#39d8ff"/>
    <rect x="140" y="170" width="92" height="34" rx="17" fill="#1a2138" stroke="#a78bfa"/>
    <rect x="250" y="170" width="96" height="34" rx="17" fill="#102a1f" stroke="#65e99a"/>
    <rect x="364" y="170" width="110" height="34" rx="17" fill="#281d13" stroke="#f6b85c"/>
    <text x="28" y="194" font-family="Inter, system-ui" font-size="16" fill="#c9fbff">Research</text>
    <text x="164" y="194" font-family="Inter, system-ui" font-size="16" fill="#e0d6ff">Build</text>
    <text x="274" y="194" font-family="Inter, system-ui" font-size="16" fill="#d4ffe2">Verify</text>
    <text x="389" y="194" font-family="Inter, system-ui" font-size="16" fill="#ffe4b0">Ship</text>
  </g>
</svg>
